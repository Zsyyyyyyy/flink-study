/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'java'
    id 'maven-publish'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
}

dependencies {
    implementation 'org.apache.flink:flink-java:1.12.1'
    implementation 'org.apache.flink:flink-clients_2.12:1.12.1'
    implementation 'org.apache.kafka:kafka-clients:3.1.0'
    implementation 'org.apache.flink:flink-core:1.12.1'
    implementation 'org.apache.flink:flink-streaming-java_2.12:1.12.1'
    implementation 'com.ververica:flink-connector-mysql-cdc:2.0.0'
    implementation 'org.apache.flink:flink-table-planner-blink_2.12:1.12.1'
    implementation 'mysql:mysql-connector-java:8.0.20'
}

group = 'org.example'
version = '1.0-SNAPSHOT'
description = 'flink-study'
java.sourceCompatibility = JavaVersion.VERSION_1_8

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}
